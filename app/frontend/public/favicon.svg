<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background Circle -->
  <circle cx="32" cy="32" r="30" fill="#10B981"/>
  
  <!-- Rising Chart Line -->
  <path d="M 12 42 L 22 38 L 32 28 L 42 32 L 52 18" 
        stroke="#FFFFFF" 
        stroke-width="3.5" 
        stroke-linecap="round" 
        stroke-linejoin="round" 
        fill="none"/>
  
  <!-- Chart Points -->
  <circle cx="12" cy="42" r="3" fill="#FFFFFF"/>
  <circle cx="22" cy="38" r="3" fill="#FFFFFF"/>
  <circle cx="32" cy="28" r="3" fill="#FFFFFF"/>
  <circle cx="42" cy="32" r="3" fill="#FFFFFF"/>
  <circle cx="52" cy="18" r="3" fill="#FFFFFF"/>
  
  <!-- Upward Arrow -->
  <path d="M 50 20 L 54 16 L 58 20" 
        stroke="#FCD34D" 
        stroke-width="3" 
        stroke-linecap="round" 
        stroke-linejoin="round" 
        fill="none"/>
  
  <!-- Subtle Grid Lines -->
  <line x1="10" y1="48" x2="54" y2="48" stroke="#FFFFFF" stroke-width="0.5" opacity="0.3"/>
  <line x1="10" y1="38" x2="54" y2="38" stroke="#FFFFFF" stroke-width="0.5" opacity="0.3"/>
  <line x1="10" y1="28" x2="54" y2="28" stroke="#FFFFFF" stroke-width="0.5" opacity="0.3"/>
</svg>
